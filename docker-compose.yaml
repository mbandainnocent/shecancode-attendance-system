version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: shecancode-postgres
    environment:
      POSTGRES_DB: shecancode
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: shecancode-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@shecancode.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres

  kafka:
    image: apache/kafka:latest
    container_name: shecancode-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

  attendence-service:
    build: .
    container_name: attendance-app
    ports:
      - "8085:8085" # Safe port bypasses your host port 8080 conflict
    depends_on:
      - kafka
      - postgres # Matches your postgres service name above perfectly
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/shecancode
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - KAFKA_SERVERS=kafka:9092
      - JWT_SECRET=my-super-secret-jwt-key-for-shecancode-attendance-system-256bits

volumes:
  postgres_data: